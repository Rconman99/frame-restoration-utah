<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Frame Roofing Utah — Directory Submission Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet" />
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; }
  .status-done { background: #dcfce7; color: #166534; }
  .status-progress { background: #fef9c3; color: #854d0e; }
  .status-not { background: #fee2e2; color: #991b1b; }
  .priority-high { background: #fecaca; color: #991b1b; }
  .priority-medium { background: #fed7aa; color: #9a3412; }
  .priority-low { background: #e0e7ff; color: #3730a3; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

const DIRECTORIES = [
  { name: "Google Business Profile", category: "Local Utah", status: "Done", priority: "High", url: "https://business.google.com/" },
  { name: "Yelp", category: "General", status: "Done", priority: "High", url: "https://biz.yelp.com/" },
  { name: "BBB (National)", category: "General", status: "Done", priority: "High", url: "https://www.bbb.org/get-listed" },
  { name: "Angi (Angie's List)", category: "Home Services", status: "Not Started", priority: "High", url: "https://www.angi.com/pro/sign-up" },
  { name: "HomeAdvisor", category: "Home Services", status: "Not Started", priority: "High", url: "https://pro.homeadvisor.com/" },
  { name: "Thumbtack", category: "Home Services", status: "Not Started", priority: "High", url: "https://www.thumbtack.com/pro/" },
  { name: "Houzz", category: "Home Services", status: "Not Started", priority: "High", url: "https://www.houzz.com/professionals" },
  { name: "Nextdoor Business", category: "Local Utah", status: "Not Started", priority: "High", url: "https://business.nextdoor.com/" },
  { name: "Facebook Business Page", category: "General", status: "Not Started", priority: "High", url: "https://www.facebook.com/business" },
  { name: "Apple Business Connect", category: "General", status: "Not Started", priority: "High", url: "https://businessconnect.apple.com/" },
  { name: "Bing Places", category: "General", status: "Not Started", priority: "High", url: "https://www.bingplaces.com/" },
  { name: "MapQuest", category: "General", status: "Not Started", priority: "Medium", url: "https://business.mapquest.com/" },
  { name: "YellowPages.com", category: "General", status: "Not Started", priority: "Medium", url: "https://www.yellowpages.com/claim" },
  { name: "Superpages", category: "General", status: "Not Started", priority: "Medium", url: "https://www.superpages.com/" },
  { name: "Manta", category: "General", status: "Not Started", priority: "Medium", url: "https://www.manta.com/claim" },
  { name: "CitySearch", category: "General", status: "Not Started", priority: "Low", url: "https://www.citysearch.com/" },
  { name: "Foursquare", category: "General", status: "Not Started", priority: "Medium", url: "https://foursquare.com/business" },
  { name: "Hotfrog", category: "General", status: "Not Started", priority: "Low", url: "https://www.hotfrog.com/" },
  { name: "BuildZoom", category: "Home Services", status: "Not Started", priority: "High", url: "https://www.buildzoom.com/" },
  { name: "Porch", category: "Home Services", status: "Not Started", priority: "High", url: "https://pro.porch.com/" },
  { name: "Networx", category: "Home Services", status: "Not Started", priority: "Medium", url: "https://www.networx.com/pro" },
  { name: "Bark", category: "Home Services", status: "Not Started", priority: "Medium", url: "https://www.bark.com/en/us/pro/" },
  { name: "ChamberofCommerce.com", category: "General", status: "Not Started", priority: "Medium", url: "https://www.chamberofcommerce.com/" },
  { name: "Local.com", category: "General", status: "Not Started", priority: "Low", url: "https://www.local.com/" },
  { name: "ShowMeLocal", category: "General", status: "Not Started", priority: "Low", url: "https://www.showmelocal.com/" },
  { name: "EZLocal", category: "General", status: "Not Started", priority: "Low", url: "https://www.ezlocal.com/" },
  { name: "USDirectory", category: "General", status: "Not Started", priority: "Low", url: "https://www.usdirectory.com/" },
  { name: "iBegin", category: "General", status: "Not Started", priority: "Low", url: "https://www.ibegin.com/" },
  { name: "2FindLocal", category: "General", status: "Not Started", priority: "Low", url: "https://www.2findlocal.com/" },
  { name: "Hub.biz", category: "General", status: "Not Started", priority: "Low", url: "https://www.hub.biz/" },
  { name: "Tuugo", category: "General", status: "Not Started", priority: "Low", url: "https://www.tuugo.us/" },
  { name: "Brownbook", category: "General", status: "Not Started", priority: "Low", url: "https://www.brownbook.net/" },
  { name: "Cylex", category: "General", status: "Not Started", priority: "Low", url: "https://www.cylex.us.com/" },
  { name: "n49.com", category: "General", status: "Not Started", priority: "Low", url: "https://www.n49.com/" },
  { name: "Storeboard", category: "General", status: "Not Started", priority: "Low", url: "https://www.storeboard.com/" },
  { name: "Utah.com Business Directory", category: "Local Utah", status: "Not Started", priority: "High", url: "https://www.utah.com/business/" },
  { name: "SLC Chamber of Commerce", category: "Local Utah", status: "Not Started", priority: "Medium", url: "https://www.slchamber.com/" },
  { name: "BBB of Utah (State)", category: "Local Utah", status: "Not Started", priority: "Medium", url: "https://www.bbb.org/local/0477" },
];

function App() {
  const [filter, setFilter] = useState("All");
  const [priorityFilter, setPriorityFilter] = useState("All");
  const [dirs, setDirs] = useState(DIRECTORIES);

  const filtered = useMemo(() => {
    return dirs.filter(d => {
      if (filter !== "All" && d.status !== filter) return false;
      if (priorityFilter !== "All" && d.priority !== priorityFilter) return false;
      return true;
    });
  }, [dirs, filter, priorityFilter]);

  const done = dirs.filter(d => d.status === "Done").length;
  const progress = dirs.filter(d => d.status === "In Progress").length;
  const total = dirs.length;
  const pct = Math.round((done / total) * 100);

  const toggleStatus = (idx) => {
    const newDirs = [...dirs];
    const realIdx = dirs.indexOf(filtered[idx]);
    const states = ["Not Started", "In Progress", "Done"];
    const cur = states.indexOf(newDirs[realIdx].status);
    newDirs[realIdx] = {...newDirs[realIdx], status: states[(cur + 1) % 3]};
    setDirs(newDirs);
  };

  const statusClass = (s) => s === "Done" ? "status-done" : s === "In Progress" ? "status-progress" : "status-not";
  const priorityClass = (p) => p === "High" ? "priority-high" : p === "Medium" ? "priority-medium" : "priority-low";

  return (
    <div className="max-w-6xl mx-auto p-6">
      <div className="bg-white rounded-xl shadow-lg p-8 mb-6">
        <div className="flex items-center justify-between mb-4">
          <div>
            <h1 className="text-3xl font-bold text-gray-900">Directory Submission Tracker</h1>
            <p className="text-gray-500 mt-1">Frame Restoration Utah LLC &bull; 435-292-8802 &bull; frameroofingutah.com</p>
          </div>
          <div className="text-right">
            <div className="text-4xl font-bold" style={{color: '#0B4060'}}>{pct}%</div>
            <div className="text-sm text-gray-500">{done} of {total} done</div>
          </div>
        </div>
        <div className="w-full bg-gray-200 rounded-full h-4 mb-2">
          <div className="h-4 rounded-full transition-all" style={{width: `${pct}%`, background: 'linear-gradient(90deg, #0B4060, #E1B969)'}}></div>
        </div>
        <div className="flex gap-4 mt-2 text-sm">
          <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-full bg-green-500 inline-block"></span> Done: {done}</span>
          <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-full bg-yellow-400 inline-block"></span> In Progress: {progress}</span>
          <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-full bg-red-400 inline-block"></span> Not Started: {total - done - progress}</span>
        </div>
      </div>

      <div className="bg-white rounded-xl shadow-lg overflow-hidden">
        <div className="p-4 border-b flex gap-4 flex-wrap">
          <div>
            <label className="text-xs font-semibold text-gray-500 uppercase mr-2">Status:</label>
            {["All", "Done", "In Progress", "Not Started"].map(s => (
              <button key={s} onClick={() => setFilter(s)}
                className={`px-3 py-1 rounded-full text-sm mr-1 ${filter === s ? 'bg-gray-800 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                {s}
              </button>
            ))}
          </div>
          <div>
            <label className="text-xs font-semibold text-gray-500 uppercase mr-2">Priority:</label>
            {["All", "High", "Medium", "Low"].map(p => (
              <button key={p} onClick={() => setPriorityFilter(p)}
                className={`px-3 py-1 rounded-full text-sm mr-1 ${priorityFilter === p ? 'bg-gray-800 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                {p}
              </button>
            ))}
          </div>
        </div>
        <table className="w-full">
          <thead>
            <tr className="text-left text-xs font-semibold text-gray-500 uppercase" style={{background: '#0B4060', color: 'white'}}>
              <th className="p-4">#</th>
              <th className="p-4">Directory</th>
              <th className="p-4">Category</th>
              <th className="p-4">Priority</th>
              <th className="p-4">Status</th>
              <th className="p-4">Action</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map((d, i) => (
              <tr key={d.name} className="border-b hover:bg-gray-50 transition-colors">
                <td className="p-4 text-gray-400 text-sm">{i + 1}</td>
                <td className="p-4 font-medium text-gray-900">{d.name}</td>
                <td className="p-4 text-sm text-gray-600">{d.category}</td>
                <td className="p-4"><span className={`px-2 py-1 rounded-full text-xs font-semibold ${priorityClass(d.priority)}`}>{d.priority}</span></td>
                <td className="p-4">
                  <button onClick={() => toggleStatus(i)} className={`px-3 py-1 rounded-full text-xs font-semibold cursor-pointer ${statusClass(d.status)}`}>
                    {d.status}
                  </button>
                </td>
                <td className="p-4">
                  <a href={d.url} target="_blank" rel="noopener noreferrer"
                    className="text-sm font-medium hover:underline" style={{color: '#0B4060'}}>
                    Submit &rarr;
                  </a>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        <div className="p-4 text-sm text-gray-400 text-center">
          Click status badges to cycle through states &bull; Showing {filtered.length} of {total} directories
        </div>
      </div>

      <div className="mt-6 bg-white rounded-xl shadow-lg p-6">
        <h2 className="font-bold text-lg mb-3" style={{color: '#0B4060'}}>Submission Info (Copy for All Directories)</h2>
        <div className="grid grid-cols-2 gap-4 text-sm">
          <div><strong>Business Name:</strong> Frame Restoration Utah LLC</div>
          <div><strong>DBA / Brand:</strong> Frame Roofing Utah</div>
          <div><strong>Phone:</strong> 435-292-8802</div>
          <div><strong>Website:</strong> https://www.frameroofingutah.com</div>
          <div><strong>Address:</strong> Spirit Lake, Idaho (servicing all Utah)</div>
          <div><strong>License:</strong> DOPL #14256097-5501</div>
          <div><strong>Categories:</strong> Roofing Contractor, Storm Damage Repair, Roof Replacement</div>
          <div><strong>Service Areas:</strong> 40+ Utah communities, Salt Lake Valley to Park City</div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
