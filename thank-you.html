    <h1>Message Received!</h1>
    <p>Thanks for reaching out to Frame Roofing Utah. Landon's team will be in touch within 24 hours — usually much faster.</p>
    <p>Need to talk now? Call <strong><a href="tel:+14353024422" style="color:#0B4060">435-302-4422</a></strong> — we answer.</p>
    <a href="/" class="btn">Back to Home</a>

<script>
  // PostHog Conversion Tracking — phone, email, form
  (function(){
    var city = (function(){
      var m = window.location.pathname.match(/\/locations\/([^\/\.]+)/);
      return m ? m[1].replace(/-/g,' ') : 'homepage';
    })();
    var page = window.location.pathname;

    // Track phone clicks
    document.querySelectorAll('a[href^="tel:"]').forEach(function(a){
      a.addEventListener('click', function(){
        if(window.posthog) posthog.capture('phone_click', {city: city, page: page, phone: a.href.replace('tel:','')});
      });
    });

    // Track email clicks
    document.querySelectorAll('a[href^="mailto:"]').forEach(function(a){
      a.addEventListener('click', function(){
        if(window.posthog) posthog.capture('email_click', {city: city, page: page, email: a.href.replace('mailto:','')});
      });
    });

    // Track form submissions
    var heroForm = document.getElementById('heroForm');
    if(heroForm){
      heroForm.addEventListener('submit', function(){
        if(window.posthog) posthog.capture('form_submitted', {city: city, page: page, form: 'hero_inspection'});
      });
    }

    // Track CTA button clicks (Free Inspection, Call buttons)
    document.querySelectorAll('.btn-primary, .btn-secondary').forEach(function(btn){
      btn.addEventListener('click', function(){
        if(window.posthog) posthog.capture('cta_click', {city: city, page: page, cta_text: btn.textContent.trim().substring(0,50)});
      });
    });
  })();
  </script>
