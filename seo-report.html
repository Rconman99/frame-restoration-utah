<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Frame Roofing Utah — SEO & Lead Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--gold:#c8a951;--green:#3fb950;--blue:#58a6ff;--purple:#bc8cff;--red:#f85149;--orange:#d29922}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#loginOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;flex-direction:column}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:48px 40px;max-width:400px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.login-box h1{font-size:1.6rem;margin-bottom:6px;color:var(--gold)}
.login-box .sub{color:var(--muted);font-size:.9rem;margin-bottom:28px}
.login-box input{width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:1.1rem;text-align:center;letter-spacing:4px;outline:none;margin-bottom:16px;transition:border .2s}
.login-box input:focus{border-color:var(--gold)}
.login-box input::placeholder{letter-spacing:normal;color:var(--muted)}
.login-btn{width:100%;padding:14px;border:none;border-radius:8px;background:var(--gold);color:#0d1117;font-size:1rem;font-weight:600;cursor:pointer;transition:opacity .2s}
.login-btn:hover{opacity:.85}
.login-err{color:var(--red);font-size:.85rem;margin-top:12px;min-height:20px}
.login-lock{font-size:2.5rem;margin-bottom:16px}
#reportWrap{display:none}
.hdr{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.hdr h1{font-size:1.4rem;color:var(--gold)}
.meta{text-align:right;font-size:.85rem;color:var(--muted)}.period{font-size:1rem;font-weight:600;color:var(--text)}
.user-bar{display:flex;align-items:center;gap:8px;margin-top:6px;justify-content:flex-end}
.user-name{color:var(--green);font-weight:500;font-size:.85rem}
.user-role{color:var(--muted);font-size:.75rem;background:rgba(139,148,158,.15);padding:2px 8px;border-radius:10px}
.tb{display:flex;gap:6px;padding:12px 24px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
.pb{padding:6px 16px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);cursor:pointer;font-size:.85rem;transition:all .2s}
.pb:hover{border-color:var(--gold);color:var(--text)}.pb.act{background:var(--gold);color:#0d1117;border-color:var(--gold);font-weight:600}
.rb{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);cursor:pointer;font-size:.85rem}
.rb:hover{border-color:var(--green);color:var(--green)}
.sm-btn{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);cursor:pointer;font-size:.85rem}
.sm-btn:hover{border-color:var(--blue);color:var(--blue)}
.sm-btn.red:hover{border-color:var(--red);color:var(--red)}
#ct{padding:24px}.ld{text-align:center;padding:60px;color:var(--muted);font-size:1.1rem}.sp{display:inline-block;width:18px;height:18px;border:2px solid var(--gold);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.kc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;text-align:center}.kc .v{font-size:2rem;font-weight:700}.kc .l{font-size:.8rem;color:var(--muted);margin-top:4px}.kc.g .v{color:var(--green)}.kc.b .v{color:var(--blue)}.kc.p .v{color:var(--purple)}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}@media(max-width:768px){.cg{grid-template-columns:1fr}}
.cc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px}.cc h3{font-size:.95rem;color:var(--muted);margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:.9rem}th{text-align:left;color:var(--muted);font-weight:500;padding:8px 10px;border-bottom:1px solid var(--border)}td{padding:8px 10px;border-bottom:1px solid rgba(48,54,61,.4)}.num{text-align:right}
.sec{margin-bottom:24px}.st{font-size:1.1rem;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}.badge{font-size:.75rem;padding:2px 10px;border-radius:10px;font-weight:500}.bg{background:rgba(63,185,80,.15);color:var(--green)}.bb{background:rgba(88,166,255,.15);color:var(--blue)}.bgo{background:rgba(210,153,34,.15);color:var(--orange)}
.lg{display:flex;flex-wrap:wrap;gap:6px}.lc{padding:4px 10px;border-radius:8px;font-size:.78rem;font-weight:500}.lh{background:rgba(63,185,80,.15);color:var(--green)}.lw{background:rgba(210,153,34,.15);color:var(--orange)}.ll{background:rgba(48,54,61,.5);color:var(--muted)}
.ib{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px}.ib h3{font-size:1rem;margin-bottom:6px}.ib p{color:var(--muted);font-size:.9rem;line-height:1.5}.ib .a{color:var(--gold);font-weight:500;margin-top:6px}
footer{text-align:center;padding:32px;color:var(--muted);font-size:.8rem;border-top:1px solid var(--border)}footer a{color:var(--blue);text-decoration:none}
/* Admin modal */
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:2000;display:none;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto}
.modal h2{font-size:1.2rem;color:var(--gold);margin-bottom:16px}
.modal .close-btn{float:right;background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer}
.modal .close-btn:hover{color:var(--text)}
.modal table{margin-bottom:16px}
.modal td .status-on{color:var(--green)}.modal td .status-off{color:var(--red)}
.add-row{display:flex;gap:8px;margin-top:12px}.add-row input{flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:.9rem;outline:none}
.add-row input:focus{border-color:var(--gold)}
.add-row button{padding:10px 20px;border:none;border-radius:8px;background:var(--gold);color:#0d1117;font-weight:600;cursor:pointer;font-size:.9rem;white-space:nowrap}
.add-row button:hover{opacity:.85}
.toggle-btn{padding:4px 12px;border:1px solid var(--border);border-radius:6px;background:transparent;cursor:pointer;font-size:.8rem}
.toggle-btn.on{color:var(--green);border-color:var(--green)}.toggle-btn.off{color:var(--red);border-color:var(--red)}
</style></head><body>

<div id="loginOverlay">

</div>

<script>
var API="https://hdcflshhomzildwqlmwh.supabase.co",FAPI=API+"/functions/v1/weekly-report",SKEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhkY2Zsc2hob216aWxkd3FsbXdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDI3NjI3NjQsImV4cCI6MjA1ODMzODc2NH0.kWSlGEtBgPFOx5eq8MYGz3VDqhAdqQTdGVlQqdRuzXk",KEY="frame-roofing-2026",curD=30,pC=null,bC=null,PIN="",CUR_USER=null;

function doLogin(e){e.preventDefault();var p=document.getElementById('pinInput').value.trim();if(!p){document.getElementById('loginErr').textContent='Please enter a PIN';return false;}
document.getElementById('loginErr').textContent='';PIN=p;
fetch(FAPI+'?key='+KEY+'&pin='+encodeURIComponent(p)+'&days=1').then(function(r){if(r.status===403){document.getElementById('loginErr').textContent='Invalid PIN. Try again.';PIN='';return;}
return r.json();}).then(function(d){if(!d||d.error)return;CUR_USER=d.user;sessionStorage.setItem('frp',p);showReport();go(curD);}).catch(function(){document.getElementById('loginErr').textContent='Connection error. Try again.';});return false;}

function showReport(){document.getElementById('loginOverlay').style.display='none';document.getElementById('reportWrap').style.display='block';if(CUR_USER){document.getElementById('userName').textContent=CUR_USER.name;document.getElementById('userRole').textContent=CUR_USER.role;if(CUR_USER.role==='admin')document.getElementById('manageBtn').style.display='inline-block';}}

function doLogout(){sessionStorage.removeItem('frp');PIN='';CUR_USER=null;document.getElementById('reportWrap').style.display='none';document.getElementById('manageBtn').style.display='none';document.getElementById('loginOverlay').style.display='flex';document.getElementById('pinInput').value='';document.getElementById('loginErr').textContent='';document.getElementById('pinInput').focus();}

(function(){var s=sessionStorage.getItem('frp');if(s){PIN=s;fetch(FAPI+'?key='+KEY+'&pin='+encodeURIComponent(s)+'&days=1').then(function(r){if(r.status===403){doLogout();return;}return r.json();}).then(function(d){if(!d||d.error){doLogout();return;}CUR_USER=d.user;showReport();go(curD);}).catch(function(){doLogout();});}})();

function sw(d,btn){curD=d;document.querySelectorAll('.pb').forEach(function(b){b.classList.remove('act')});btn.classList.add('act');document.getElementById('rPeriod').textContent='Last '+d+' Days';go(d);}

async function go(days){var el=document.getElementById('ct');el.innerHTML='<div class="ld"><span class="sp"></span> Loading live data...</div>';
try{var r=await fetch(FAPI+'?key='+KEY+'&pin='+encodeURIComponent(PIN)+'&days='+days);if(r.status===403){doLogout();return;}var D=await r.json();if(D.error)throw new Error(D.error);
if(D.user)CUR_USER=D.user;document.getElementById('rDate').textContent=new Date(D.generated_at).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});render(D);}catch(e){el.innerHTML='<div class="ld" style="color:var(--red)">Error: '+e.message+'</div>';}}

/* Admin Panel */
async function openAdmin(){document.getElementById('adminModal').classList.add('show');await loadUsers();}
function closeAdmin(){document.getElementById('adminModal').classList.remove('show');}
async function loadUsers(){var r=await fetch(API+'/rest/v1/report_access?select=id,name,pin,role,active,last_accessed&order=created_at',{headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY}});var users=await r.json();var tb=document.getElementById('accessBody');tb.innerHTML='';
users.forEach(function(u){var la=u.last_accessed?new Date(u.last_accessed).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'Never';
var tr=document.createElement('tr');tr.innerHTML='<td>'+u.name+'</td><td style="font-family:monospace;color:var(--muted)">'+u.pin+'</td><td>'+u.role+'</td><td>'+(u.active?'<span class="status-on">Active</span>':'<span class="status-off">Disabled</span>')+'</td><td><button class="toggle-btn '+(u.active?'on':'off')+'" onclick="toggleUser(\''+u.id+'\','+!u.active+')">'+(u.active?'Disable':'Enable')+'</button></td>';
tb.appendChild(tr);});}

async function toggleUser(id,active){await fetch(API+'/rest/v1/report_access?id=eq.'+id,{method:'PATCH',headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({active:active})});loadUsers();}

async function addUser(){var n=document.getElementById('newName').value.trim(),p=document.getElementById('newPin').value.trim();if(!n||!p){document.getElementById('adminMsg').textContent='Name and PIN required';document.getElementById('adminMsg').style.color='var(--red)';return;}
var r=await fetch(API+'/rest/v1/report_access',{method:'POST',headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({name:n,pin:p,role:'viewer'})});
if(r.ok){document.getElementById('newName').value='';document.getElementById('newPin').value='';document.getElementById('adminMsg').textContent=n+' added!';document.getElementById('adminMsg').style.color='var(--green)';loadUsers();}else{var e=await r.json();document.getElementById('adminMsg').textContent=e.message||'Error adding user';document.getElementById('adminMsg').style.color='var(--red)';}}

function ins(t,tx,a){return '<div class="ib"><h3>'+t+'</h3><p>'+tx+'</p><p class="a">&rarr; '+a+'</p></div>';}

function render(D){
var S=D.summary||{},G=D.gap_summary||{locations_with_traffic:0,total_locations:59,coverage_pct:0,locations_no_traffic:59};
var h='<div class="kg">';
[{v:S.total_pageviews||0,l:"Pageviews",c:""},{v:S.google_organic||0,l:"Google Organic",c:"g"},{v:S.total_leads||0,l:"Form Leads",c:"b"},{v:S.total_calls||0,l:"Inbound Calls",c:"b"},{v:(S.total_call_minutes||0)+"m",l:"Call Minutes",c:"p"},{v:(S.conversion_rate_pct||0)+"%",l:"Conversion Rate",c:""},{v:(G.locations_with_traffic||0)+"/"+(G.total_locations||59),l:"Locations Active",c:"g"},{v:"$"+(S.total_job_value||0),l:"Revenue Tracked",c:""}].forEach(function(k){h+='<div class="kc '+k.c+'"><div class="v">'+k.v+'</div><div class="l">'+k.l+'</div></div>';});
h+='</div>';
h+='<div class="cg"><div class="cc"><h3>Traffic by Section</h3><canvas id="pieC"></canvas></div><div class="cc"><h3>Traffic Sources</h3><canvas id="barC"></canvas></div></div>';
h+='<div class="sec"><div class="st">Top Pages <span class="badge bb">by pageviews</span></div><div class="cc"><table><thead><tr><th>Page</th><th class="num">Views</th><th class="num">%</th></tr></thead><tbody>';
var tp=D.top_pages||[];if(tp.length){tp.forEach(function(p){var pct=S.total_pageviews>0?(p.views/S.total_pageviews*100).toFixed(1):"0";var nm=p.path==="/"?"Homepage":p.path.replace(/^\//,"").replace(/\//g," / ");h+='<tr><td>'+nm+'</td><td class="num">'+p.views+'</td><td class="num">'+pct+'%</td></tr>';});}else{h+='<tr><td colspan="3" style="color:var(--muted);text-align:center">Pageview data collecting</td></tr>';}
h+='</tbody></table></div></div>';
h+='<div class="sec"><div class="st">Location Pages <span class="badge bgo">'+(G.coverage_pct||0)+'% coverage</span></div><div class="cc"><h3>Green = 5+ views &middot; Orange = 2-4 &middot; Gray = 0</h3><div class="lg">';
(D.location_performance||[]).forEach(function(l){var c=l.views>=5?"lh":l.views>=2?"lw":"ll";h+='<span class="lc '+c+'">'+l.location.replace(/-/g," ")+' ('+l.views+')</span>';});
(D.location_gaps||[]).forEach(function(l){h+='<span class="lc ll">'+l.replace(/-/g," ")+'</span>';});
h+='</div></div></div>';
h+='<div class="sec"><div class="st">Leads & Calls <span class="badge bg">conversion pipeline</span></div><div class="cg">';
h+='<div class="cc"><h3>Recent Leads</h3><table><thead><tr><th>Name</th><th>Service</th><th>Source</th><th>Date</th></tr></thead><tbody>';
var rl=(D.leads||[]).filter(function(l){return !l.name||l.name.indexOf("TEST")===-1;});
if(rl.length){rl.forEach(function(l){var d=new Date(l.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'});h+='<tr><td>'+l.name+'</td><td>'+(l.service||"")+'</td><td>'+(l.source_page||"")+'</td><td>'+d+'</td></tr>';});}else{h+='<tr><td colspan="4" style="color:var(--muted);text-align:center">No leads this period</td></tr>';}
h+='</tbody></table></div>';
h+='<div class="cc"><h3>Recent Calls</h3><table><thead><tr><th>From</th><th>City</th><th>Dur</th><th>Date</th></tr></thead><tbody>';
var cl=D.calls||[];if(cl.length){cl.forEach(function(c){var d=new Date(c.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'});var dur=c.duration_seconds?c.duration_seconds+"s":"\u2014";h+='<tr><td>'+c.from_number+'</td><td>'+(c.city||"Unknown")+'</td><td>'+dur+'</td><td>'+d+'</td></tr>';});}else{h+='<tr><td colspan="4" style="color:var(--muted);text-align:center">No calls this period</td></tr>';}
h+='</tbody></table></div></div></div>';
h+='<div class="sec"><div class="st">Insights & Recommendations</div>';
if(S.google_organic>0){h+=ins("Google is finding you",S.google_organic+" visits from Google organic. Pages indexed and ranking.","Keep publishing blog content + build backlinks.");}else{h+=ins("Google organic at zero","No Google organic traffic yet. Pages indexed but not ranking high enough.","Focus on backlink acquisition and Google Business Profile.");}
if((G.locations_no_traffic||0)>20){var big=(D.location_gaps||[]).filter(function(l){return["sandy","provo","orem","ogden","lehi","west-valley-city","murray","riverton","south-jordan","taylorsville"].indexOf(l)!==-1;});h+=ins(G.locations_no_traffic+" locations have zero traffic","Only "+G.coverage_pct+"% of "+G.total_locations+" location pages getting visits. Big cities: "+big.map(function(l){return l.replace(/-/g," ");}).join(", ")+".","Create blog posts targeting these cities + internal links from service pages.");}
if((D.location_performance||[]).length>0){var top=D.location_performance[0];h+=ins(top.location.replace(/-/g," ")+" is your top location",top.location.replace(/-/g," ")+" leads with "+top.views+" views.","Write neighborhood-specific blog posts, get Google reviews for these cities.");}
if(S.total_job_value===0){h+=ins("Track job values to prove ROI","No job values logged yet. Once leads convert with dollar amounts, this shows your exact 10% commission.","Update lead records in Supabase with job_value and commission.");}
h+='</div>';
document.getElementById('ct').innerHTML=h;
if(typeof Chart!=='undefined'){var TB=D.traffic_breakdown||{},TS=D.traffic_sources||{};if(pC)pC.destroy();if(bC)bC.destroy();
var pe=document.getElementById('pieC');if(pe){var pl=Object.keys(TB).length?Object.keys(TB).map(function(k){return k.charAt(0).toUpperCase()+k.slice(1);}):["No data"];pC=new Chart(pe,{type:"doughnut",data:{labels:pl,datasets:[{data:Object.keys(TB).length?Object.values(TB):[1],backgroundColor:["#c8a951","#3fb950","#58a6ff","#bc8cff","#d29922","#8b949e"],borderWidth:0}]},options:{responsive:true,plugins:{legend:{position:"bottom",labels:{color:"#8b949e",padding:12,font:{size:12}}}}}});}
var be=document.getElementById('barC');if(be){var sl=Object.keys(TS).length?Object.keys(TS).map(function(s){return s==="$direct"?"Direct":s.replace("www.","");}):["No data"];bC=new Chart(be,{type:"bar",data:{labels:sl,datasets:[{data:Object.keys(TS).length?Object.values(TS):[0],backgroundColor:["#58a6ff","#3fb950","#c8a951","#bc8cff","#d29922","#8b949e","#f85149","#e6edf3"],borderRadius:6,borderSkipped:false}]},options:{responsive:true,indexAxis:"y",plugins:{legend:{display:false}},scales:{x:{grid:{color:"rgba(48,54,61,.5)"},ticks:{color:"#8b949e"}},y:{grid:{display:false},ticks:{color:"#e6edf3",font:{size:12}}}}}});}}}
