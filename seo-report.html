<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frame Roofing Utah — SEO & Lead Tracker</title>
<meta name="robots" content="noindex, nofollow">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--gold:#c8a951;--dark:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--green:#3fb950;--red:#f85149;--blue:#58a6ff;--orange:#d29922;--purple:#bc8cff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--dark);color:var(--text);line-height:1.5}
.ctr{max-width:1200px;margin:0 auto;padding:24px}
.hdr{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;padding:24px 0;border-bottom:1px solid var(--border);margin-bottom:24px}
.hdr h1{font-size:24px;font-weight:700}.hdr h1 span{color:var(--gold)}
.hdr .meta{color:var(--muted);font-size:14px;text-align:right}
.period{color:var(--blue);font-weight:600}
.kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:28px}
.kc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.kc .v{font-size:32px;font-weight:700;color:var(--gold)}.kc .l{font-size:12px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.kc.g .v{color:var(--green)}.kc.b .v{color:var(--blue)}.kc.p .v{color:var(--purple)}
.sec{margin-bottom:28px}
.st{font-size:18px;font-weight:600;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.badge{font-size:11px;padding:2px 8px;border-radius:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.bg{background:rgba(63,185,80,.15);color:var(--green)}.bb{background:rgba(88,166,255,.15);color:var(--blue)}.bgo{background:rgba(200,169,81,.15);color:var(--gold)}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.cc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.cc h3{font-size:14px;color:var(--muted);margin-bottom:12px}.cc canvas{max-height:280px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:14px}
th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
tr:hover td{background:rgba(88,166,255,.04)}.num{text-align:right;font-variant-numeric:tabular-nums}
.lg{display:flex;flex-wrap:wrap;gap:6px}
.lc{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:500;border:1px solid var(--border)}
.lh{background:rgba(63,185,80,.2);border-color:var(--green);color:var(--green)}
.lw{background:rgba(210,153,34,.15);border-color:var(--orange);color:var(--orange)}
.ll{background:rgba(248,81,73,.08);border-color:rgba(248,81,73,.3);color:var(--muted)}
.ib{background:linear-gradient(135deg,rgba(200,169,81,.08),rgba(88,166,255,.08));border:1px solid var(--gold);border-radius:12px;padding:20px;margin-bottom:16px}
.ib h3{color:var(--gold);margin-bottom:8px;font-size:16px}.ib p{color:var(--text);font-size:14px;margin-bottom:6px}.ib .a{color:var(--blue);font-weight:600}
.ld{text-align:center;padding:60px;color:var(--muted);font-size:18px}
.sp{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin-right:12px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.pb{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:6px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500}
.pb.act{background:var(--gold);color:var(--dark);border-color:var(--gold)}
.rb{background:var(--card);border:1px solid var(--border);color:var(--blue);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px}
.rb:hover{background:var(--blue);color:var(--dark)}
.ft{text-align:center;color:var(--muted);font-size:12px;padding:24px 0;border-top:1px solid var(--border);margin-top:28px}
@media(max-width:768px){.cg{grid-template-columns:1fr}.kg{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="ctr">
<div class="hdr"><div><h1>Frame Roofing <span>Utah</span></h1><div style="color:var(--muted);font-size:14px">SEO & Lead Attribution Tracker</div></div>
<div class="meta"><div>Live Data &middot; <span id="rDate"></span></div><div class="period" id="rPeriod">Last 30 Days</div>
<div style="margin-top:6px"><button class="rb" onclick="go(curD)">&#x21bb; Refresh</button></div></div></div>
<div style="display:flex;gap:8px;margin-bottom:20px">
<button class="pb" onclick="sw(7,this)">7 Days</button><button class="pb" onclick="sw(14,this)">14 Days</button>
<button class="pb act" onclick="sw(30,this)">30 Days</button><button class="pb" onclick="sw(90,this)">90 Days</button></div>
<div id="ct"><div class="ld"><span class="sp"></span> Loading live data...</div></div>
<div class="ft">Frame Roofing Utah &mdash; Live SEO Tracker &middot; Powered by PostHog + Supabase<br>
Built by Ryan Conwell &middot; <a href="https://us.posthog.com/project/333074/dashboard/1454051" target="_blank" style="color:var(--blue);text-decoration:none">PostHog Dashboard &nearr;</a></div>
</div>
<script>
var API="https://hdcflshhomzildwqlmwh.supabase.co/functions/v1/weekly-report",KEY="frame-roofing-2026",curD=30,pC=null,bC=null;
function sw(d,btn){curD=d;document.querySelectorAll('.pb').forEach(function(b){b.classList.remove('act')});btn.classList.add('act');document.getElementById('rPeriod').textContent='Last '+d+' Days';go(d);}
async function go(days){var el=document.getElementById('ct');el.innerHTML='<div class="ld"><span class="sp"></span> Loading live data...</div>';
try{var r=await fetch(API+'?key='+KEY+'&days='+days);var D=await r.json();if(D.error)throw new Error(D.error);
document.getElementById('rDate').textContent=new Date(D.generated_at).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});render(D);}catch(e){el.innerHTML='<div class="ld" style="color:var(--red)">Error: '+e.message+'</div>';}}
function ins(t,tx,a){return '<div class="ib"><h3>'+t+'</h3><p>'+tx+'</p><p class="a">&rarr; '+a+'</p></div>';}
function render(D){
var S=D.summary||{},G=D.gap_summary||{locations_with_traffic:0,total_locations:59,coverage_pct:0,locations_no_traffic:59};
var h='<div class="kg">';
[{v:S.total_pageviews||0,l:"Pageviews",c:""},{v:S.google_organic||0,l:"Google Organic",c:"g"},{v:S.total_leads||0,l:"Form Leads",c:"b"},{v:S.total_calls||0,l:"Inbound Calls",c:"b"},{v:(S.total_call_minutes||0)+"m",l:"Call Minutes",c:"p"},{v:(S.conversion_rate_pct||0)+"%",l:"Conversion Rate",c:""},{v:(G.locations_with_traffic||0)+"/"+(G.total_locations||59),l:"Locations Active",c:"g"},{v:"$"+(S.total_job_value||0),l:"Revenue Tracked",c:""}].forEach(function(k){h+='<div class="kc '+k.c+'"><div class="v">'+k.v+'</div><div class="l">'+k.l+'</div></div>';});
h+='</div>';
h+='<div class="cg"><div class="cc"><h3>Traffic by Section</h3><canvas id="pieC"></canvas></div><div class="cc"><h3>Traffic Sources</h3><canvas id="barC"></canvas></div></div>';
h+='<div class="sec"><div class="st">Top Pages <span class="badge bb">by pageviews</span></div><div class="cc"><table><thead><tr><th>Page</th><th class="num">Views</th><th class="num">%</th></tr></thead><tbody>';
var tp=D.top_pages||[];if(tp.length){tp.forEach(function(p){var pct=S.total_pageviews>0?(p.views/S.total_pageviews*100).toFixed(1):"0";var nm=p.path==="/"?"Homepage":p.path.replace(/^\//,"").replace(/\//g," / ");h+='<tr><td>'+nm+'</td><td class="num">'+p.views+'</td><td class="num">'+pct+'%</td></tr>';});}else{h+='<tr><td colspan="3" style="color:var(--muted);text-align:center">Pageview data collecting — tracking recently fixed</td></tr>';}
h+='</tbody></table></div></div>';
h+='<div class="sec"><div class="st">Location Pages <span class="badge bgo">'+(G.coverage_pct||0)+'% coverage</span></div><div class="cc"><h3>Green = 5+ views &middot; Orange = 2-4 &middot; Gray = 0</h3><div class="lg">';
(D.location_performance||[]).forEach(function(l){var c=l.views>=5?"lh":l.views>=2?"lw":"ll";h+='<span class="lc '+c+'">'+l.location.replace(/-/g," ")+' ('+l.views+')</span>';});
(D.location_gaps||[]).forEach(function(l){h+='<span class="lc ll">'+l.replace(/-/g," ")+'</span>';});
h+='</div></div></div>';
h+='<div class="sec"><div class="st">Leads & Calls <span class="badge bg">conversion pipeline</span></div><div class="cg">';
h+='<div class="cc"><h3>Recent Leads</h3><table><thead><tr><th>Name</th><th>Service</th><th>Source</th><th>Date</th></tr></thead><tbody>';
var rl=(D.leads||[]).filter(function(l){return !l.name||l.name.indexOf("TEST")===-1;});
if(rl.length){rl.forEach(function(l){var d=new Date(l.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'});h+='<tr><td>'+l.name+'</td><td>'+(l.service||"")+'</td><td>'+(l.source_page||"")+'</td><td>'+d+'</td></tr>';});}else{h+='<tr><td colspan="4" style="color:var(--muted);text-align:center">No leads this period</td></tr>';}
h+='</tbody></table></div>';
h+='<div class="cc"><h3>Recent Calls</h3><table><thead><tr><th>From</th><th>City</th><th>Dur</th><th>Date</th></tr></thead><tbody>';
var cl=D.calls||[];if(cl.length){cl.forEach(function(c){var d=new Date(c.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'});var dur=c.duration_seconds?c.duration_seconds+"s":"\u2014";h+='<tr><td>'+c.from_number+'</td><td>'+(c.city||"Unknown")+'</td><td>'+dur+'</td><td>'+d+'</td></tr>';});}else{h+='<tr><td colspan="4" style="color:var(--muted);text-align:center">No calls this period</td></tr>';}
h+='</tbody></table></div></div></div>';
h+='<div class="sec"><div class="st">Insights & Recommendations</div>';
if(S.google_organic>0){h+=ins("Google is finding you",S.google_organic+" visits from Google organic. Pages indexed and ranking.","Keep publishing blog content + build backlinks.");}else{h+=ins("Google organic at zero","No Google organic traffic yet. Pages indexed but not ranking high enough.","Focus on backlink acquisition and Google Business Profile.");}
if((G.locations_no_traffic||0)>20){var big=(D.location_gaps||[]).filter(function(l){return["sandy","provo","orem","ogden","lehi","west-valley-city","murray","riverton","south-jordan","taylorsville"].indexOf(l)!==-1;});h+=ins(G.locations_no_traffic+" locations have zero traffic","Only "+G.coverage_pct+"% of "+G.total_locations+" location pages getting visits. Big cities: "+big.map(function(l){return l.replace(/-/g," ");}).join(", ")+".","Create blog posts targeting these cities + internal links from service pages.");}
if((D.location_performance||[]).length>0){var top=D.location_performance[0];h+=ins(top.location.replace(/-/g," ")+" is your top location",top.location.replace(/-/g," ")+" leads with "+top.views+" views.","Write neighborhood-specific blog posts, get Google reviews for these cities.");}
if(S.total_job_value===0){h+=ins("Track job values to prove ROI","No job values logged yet. Once leads convert with dollar amounts, this shows your exact 10% commission.","Update lead records in Supabase with job_value and commission.");}
h+='</div>';
document.getElementById('ct').innerHTML=h;
if(typeof Chart!=='undefined'){var TB=D.traffic_breakdown||{},TS=D.traffic_sources||{};if(pC)pC.destroy();if(bC)bC.destroy();
var pe=document.getElementById('pieC');if(pe){var pl=Object.keys(TB).length?Object.keys(TB).map(function(k){return k.charAt(0).toUpperCase()+k.slice(1);}):["No data"];pC=new Chart(pe,{type:"doughnut",data:{labels:pl,datasets:[{data:Object.keys(TB).length?Object.values(TB):[1],backgroundColor:["#c8a951","#3fb950","#58a6ff","#bc8cff","#d29922","#8b949e"],borderWidth:0}]},options:{responsive:true,plugins:{legend:{position:"bottom",labels:{color:"#8b949e",padding:12,font:{size:12}}}}}});}
var be=document.getElementById('barC');if(be){var sl=Object.keys(TS).length?Object.keys(TS).map(function(s){return s==="$direct"?"Direct":s.replace("www.","");}):["No data"];bC=new Chart(be,{type:"bar",data:{labels:sl,datasets:[{data:Object.keys(TS).length?Object.values(TS):[0],backgroundColor:["#58a6ff","#3fb950","#c8a951","#bc8cff","#d29922","#8b949e","#f85149","#e6edf3"],borderRadius:6,borderSkipped:false}]},options:{responsive:true,indexAxis:"y",plugins:{legend:{display:false}},scales:{x:{grid:{color:"rgba(48,54,61,.5)"},ticks:{color:"#8b949e"}},y:{grid:{display:false},ticks:{color:"#e6edf3",font:{size:12}}}}}});}}}
go(curD);
</script>
</body>
</html>
